name: my_app
description: A professional notes app with rich media features
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Core
  cupertino_icons: ^1.0.6

  # HTTP Requests
  http: ^1.1.0
  http_parser: ^4.0.2

  # File & Path
  path: ^1.9.0
  path_provider: ^2.1.1

  # Image & Camera
  image_picker: ^1.0.4
  camera: ^0.10.5
  flutter_image_compress: ^2.1.0

  # Drawing
  signature: ^5.4.0
  screenshot: ^2.1.0

  # File Picker
  file_picker: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true